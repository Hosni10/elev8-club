kind = "web"
previewPath = "/"
title = "Elev8 Football Academy"
version = "1.0.0"
id = "artifacts/elev8-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21446

[services.development]
run = "pnpm --filter @workspace/elev8-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/elev8-academy", "run", "build" ]
publicDir = "artifacts/elev8-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21446"
BASE_PATH = "/"
